<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矩陣計算工具 | Matrix Toolkit</title>
<style>
  :root{ --navy:#0b1f3a; --navy2:#13284a; --gold:#c9a14a; --gold2:#e0bf6e; --bg:#f5f3ee; --ink:#1c2530; --line:#d8d2c2; }
  *{box-sizing:border-box;}
  body{margin:0; font-family:"Noto Sans TC","Segoe UI",sans-serif; background:var(--bg); color:var(--ink);}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#f5f3ee; padding:28px 32px;}
  header h1{margin:0; font-size:22px;}
  header span{color:var(--gold2); font-size:13px; display:block; margin-top:4px;}
  main{max-width:1000px; margin:0 auto; padding:28px 20px 60px;}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:20px 22px; margin-bottom:20px; box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{font-size:15px; margin:0 0 14px; color:var(--navy); border-bottom:2px solid var(--gold); padding-bottom:8px;}
  label{display:block; font-size:12.5px; color:#555; margin:10px 0 4px;}
  input,select{padding:8px 10px; border:1px solid #ccc; border-radius:6px; font-size:14px; background:#fafaf8;}
  textarea{width:100%; min-height:120px; font-family:monospace; font-size:14px; padding:10px; border:1px solid #ccc; border-radius:6px;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  button{padding:10px 18px; border:none; border-radius:7px; background:var(--navy); color:#fff; font-size:14px; font-weight:600; cursor:pointer;}
  button:hover{background:var(--navy2);}
  button.secondary{background:#888;}
  pre{background:#fafaf8; border:1px solid var(--line); border-radius:8px; padding:14px; font-size:13px; overflow-x:auto; white-space:pre-wrap;}
  .err{color:#c0392b; font-weight:600;}
  .note{font-size:12px; color:#888; margin-top:10px; line-height:1.6;}
</style>
<script src="https://yj-chen0830.github.io/jrh-core/jrh-core.js?v=3" defer></script>
</head>
<body data-tool="mx">
<header>
  <a href="https://yj-chen0830.github.io/engineering-hub/" style="color:var(--gold2);font-size:12.5px;text-decoration:none;display:inline-block;margin-bottom:8px;">← 返回工程計算中心</a>
  <h1>矩陣計算工具 (Matrix Toolkit)</h1>
  <span>反矩陣 · 行列式 · 解線性方程組 · 特徵值/特徵向量（QR algorithm）</span>
</header>

<main>
  <div class="card">
    <h2>輸入矩陣 A</h2>
    <label>每列用換行分隔，每個數字用空格或逗號分隔（方陣，建議 n ≤ 8）</label>
    <textarea id="matA">4 1 2
1 3 0
2 0 5</textarea>
    <div class="row" style="margin-top:12px;">
      <select id="size" onchange="fillExample()">
        <option value="3">範例：3x3</option>
        <option value="2">範例：2x2 (旋轉矩陣)</option>
        <option value="4">範例：4x4 (對稱)</option>
      </select>
      <button onclick="doInverse()">反矩陣 / 行列式</button>
      <button onclick="doEigen()">特徵值 / 特徵向量</button>
      <button class="secondary" onclick="document.getElementById('out').textContent=''">清除結果</button>
    </div>
  </div>

  <div class="card">
    <h2>解線性方程組 Ax = b</h2>
    <label>b 向量（用空格或逗號分隔，長度需等於 A 的列數）</label>
    <input id="bvec" style="width:100%;" value="9 4 7">
    <div class="row" style="margin-top:12px;">
      <button onclick="doSolve()">求解 x</button>
    </div>
  </div>

  <div class="card">
    <h2>結果 Result</h2>
    <pre id="out">（尚未計算）</pre>
    <div class="note">
      特徵值採用 QR algorithm（含 Wilkinson shift 簡化版）反覆迭代收斂，對一般實矩陣（含非對稱）通常可在 200 次迭代內收斂到實數特徵值；
      若矩陣含複數特徵值（2x2 旋轉子塊未完全收斂），會標示為近似的 2x2 子塊角度。僅供工程初步估算使用。
    </div>
  </div>
</main>

<script>
function parseMatrix(text){
  const rows = text.trim().split('\n').map(r=>r.trim()).filter(r=>r.length);
  return rows.map(r=>r.split(/[\s,]+/).map(Number));
}
function parseVec(text){
  return text.trim().split(/[\s,]+/).map(Number);
}
function fillExample(){
  const v = document.getElementById('size').value;
  const ta = document.getElementById('matA');
  if(v==='2') ta.value = "0 -1\n1 0";
  else if(v==='4') ta.value = "4 1 0 0\n1 4 1 0\n0 1 4 1\n0 0 1 4";
  else ta.value = "4 1 2\n1 3 0\n2 0 5";
}

function identity(n){
  const I = [];
  for(let i=0;i<n;i++){ I.push(Array(n).fill(0)); I[i][i]=1; }
  return I;
}
function matMul(A,B){
  const n=A.length, m=B[0].length, k=B.length;
  const C = Array.from({length:n},()=>Array(m).fill(0));
  for(let i=0;i<n;i++) for(let j=0;j<m;j++){
    let s=0; for(let p=0;p<k;p++) s+=A[i][p]*B[p][j];
    C[i][j]=s;
  }
  return C;
}
function transpose(A){
  return A[0].map((_,j)=>A.map(row=>row[j]));
}
function copyMat(A){ return A.map(r=>r.slice()); }

function luInverseAndDet(Ain){
  const n = Ain.length;
  const A = copyMat(Ain);
  const I = identity(n);
  let det = 1;
  for(let col=0; col<n; col++){
    // pivot
    let piv = col;
    for(let r=col+1;r<n;r++) if(Math.abs(A[r][col])>Math.abs(A[piv][col])) piv = r;
    if(Math.abs(A[piv][col]) < 1e-12) return {error:'矩陣為奇異 (singular)，無反矩陣，行列式=0'};
    if(piv!==col){
      [A[piv],A[col]]=[A[col],A[piv]];
      [I[piv],I[col]]=[I[col],I[piv]];
      det *= -1;
    }
    const pv = A[col][col];
    det *= pv;
    for(let j=0;j<n;j++){ A[col][j]/=pv; I[col][j]/=pv; }
    for(let r=0;r<n;r++){
      if(r===col) continue;
      const f = A[r][col];
      if(f===0) continue;
      for(let j=0;j<n;j++){ A[r][j]-=f*A[col][j]; I[r][j]-=f*I[col][j]; }
    }
  }
  return {inverse:I, det};
}

function doInverse(){
  try{
    const A = parseMatrix(document.getElementById('matA').value);
    if(A.length!==A[0].length) throw new Error('必須為方陣');
    const res = luInverseAndDet(A);
    const out = document.getElementById('out');
    if(res.error){ out.innerHTML = `<span class="err">${res.error}</span>`; return; }
    out.textContent =
      `行列式 det(A) = ${res.det.toFixed(6)}\n\n反矩陣 A⁻¹ =\n` +
      res.inverse.map(r=>r.map(x=>x.toFixed(4).padStart(10)).join(' ')).join('\n');
  }catch(e){
    document.getElementById('out').innerHTML = `<span class="err">輸入錯誤：${e.message}</span>`;
  }
}

function doSolve(){
  try{
    const A = parseMatrix(document.getElementById('matA').value);
    const b = parseVec(document.getElementById('bvec').value);
    if(A.length!==A[0].length) throw new Error('A 必須為方陣');
    if(b.length!==A.length) throw new Error('b 向量長度需等於 A 的列數');
    const res = luInverseAndDet(A);
    const out = document.getElementById('out');
    if(res.error){ out.innerHTML = `<span class="err">${res.error}</span>`; return; }
    const x = res.inverse.map(row=>row.reduce((s,v,i)=>s+v*b[i],0));
    out.textContent = `解 x =\n` + x.map((v,i)=>`x${i+1} = ${v.toFixed(6)}`).join('\n');
  }catch(e){
    document.getElementById('out').innerHTML = `<span class="err">輸入錯誤：${e.message}</span>`;
  }
}

// QR algorithm (basic, real Schur form) for eigenvalues of general real matrix.
// Eigenvectors solved afterward via inverse iteration per eigenvalue.
function qrDecompose(A){
  const n = A.length;
  const Q = identity(n);
  const R = copyMat(A);
  for(let k=0;k<n-1;k++){
    // Householder reflection for column k
    let normx = 0;
    for(let i=k;i<n;i++) normx += R[i][k]*R[i][k];
    normx = Math.sqrt(normx);
    if(normx < 1e-14) continue;
    const sign = R[k][k] >= 0 ? 1 : -1;
    const v = Array(n).fill(0);
    for(let i=k;i<n;i++) v[i] = R[i][k];
    v[k] += sign*normx;
    let vnorm = Math.sqrt(v.reduce((s,x)=>s+x*x,0));
    if(vnorm < 1e-14) continue;
    for(let i=0;i<n;i++) v[i]/=vnorm;
    // R = R - 2 v (v^T R)
    for(let j=0;j<n;j++){
      let dot=0; for(let i=0;i<n;i++) dot += v[i]*R[i][j];
      for(let i=0;i<n;i++) R[i][j] -= 2*v[i]*dot;
    }
    // Q = Q - 2 (Q v) v^T
    for(let i=0;i<n;i++){
      let dot=0; for(let j=0;j<n;j++) dot += Q[i][j]*v[j];
      for(let j=0;j<n;j++) Q[i][j] -= 2*dot*v[j];
    }
  }
  return {Q, R};
}

function eigenvaluesQR(Ain, iters=500){
  let A = copyMat(Ain);
  const n = A.length;
  for(let it=0; it<iters; it++){
    const {Q,R} = qrDecompose(A);
    A = matMul(R,Q);
  }
  // diagonal (or 2x2 block) entries approximate eigenvalues
  const vals = [];
  let i=0;
  while(i<n){
    if(i===n-1){ vals.push({re:A[i][i], im:0}); i++; continue; }
    const sub = Math.abs(A[i+1][i]);
    if(sub < 1e-6*(Math.abs(A[i][i])+Math.abs(A[i+1][i+1])+1e-12)){
      vals.push({re:A[i][i], im:0});
      i++;
    } else {
      // 2x2 block -> possibly complex pair
      const a=A[i][i], b=A[i][i+1], c=A[i+1][i], d=A[i+1][i+1];
      const tr=a+d, dt=a*d-b*c;
      const disc = tr*tr-4*dt;
      if(disc>=0){
        const s=Math.sqrt(disc);
        vals.push({re:(tr+s)/2, im:0});
        vals.push({re:(tr-s)/2, im:0});
      } else {
        const s=Math.sqrt(-disc);
        vals.push({re:tr/2, im:s/2});
        vals.push({re:tr/2, im:-s/2});
      }
      i+=2;
    }
  }
  return vals;
}

function eigenvectorFor(A, lambda){
  // inverse iteration on (A - lambda*I + eps*I)
  const n = A.length;
  const eps = 1e-6;
  const M = copyMat(A);
  for(let i=0;i<n;i++) M[i][i] -= (lambda+eps);
  const res = luInverseAndDet(M);
  let v = Array(n).fill(1/Math.sqrt(n));
  if(res.error){
    // singular as expected near true eigenvector; perturb slightly
    for(let i=0;i<n;i++) M[i][i] += 1e-4;
  }
  const inv = luInverseAndDet(M).inverse;
  if(!inv) return v;
  for(let it=0; it<50; it++){
    let nv = inv.map(row=>row.reduce((s,x,i)=>s+x*v[i],0));
    const norm = Math.sqrt(nv.reduce((s,x)=>s+x*x,0)) || 1;
    nv = nv.map(x=>x/norm);
    v = nv;
  }
  return v;
}

function doEigen(){
  try{
    const A = parseMatrix(document.getElementById('matA').value);
    if(A.length!==A[0].length) throw new Error('必須為方陣');
    if(A.length>8) throw new Error('建議 n ≤ 8（QR 迭代法在此單檔工具未做大型矩陣優化）');
    const vals = eigenvaluesQR(A);
    let txt = '特徵值 Eigenvalues:\n';
    vals.forEach((v,i)=>{
      txt += `λ${i+1} = ${v.re.toFixed(6)}` + (Math.abs(v.im)>1e-9 ? ` ${v.im>=0?'+':''}${v.im.toFixed(6)}i` : '') + '\n';
    });
    txt += '\n特徵向量 Eigenvectors (僅對實特徵值求解):\n';
    vals.forEach((v,i)=>{
      if(Math.abs(v.im)>1e-9){ txt += `v${i+1}: 複數特徵值，略過 (對稱矩陣不會出現複數解)\n`; return; }
      const vec = eigenvectorFor(A, v.re);
      txt += `v${i+1} (for λ=${v.re.toFixed(4)}) = [${vec.map(x=>x.toFixed(4)).join(', ')}]\n`;
    });
    document.getElementById('out').textContent = txt;
  }catch(e){
    document.getElementById('out').innerHTML = `<span class="err">輸入錯誤：${e.message}</span>`;
  }
}
</script>
